name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platforms
        run: |
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -5

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          echo "GRADLE_HOME=$PWD/gradle-8.2" >> $GITHUB_ENV
          echo "$PWD/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Build APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AutoHelper
          path: app/build/outputs/apk/debug/app-debug.apk
